# =============================================================================
# TabularGP Configuration
# =============================================================================

# Problem type: "regression" or "classification"
problem: "classification"

# OpenML dataset ID (https://www.openml.org/search?type=data)
# Examples:
#   - 31:   credit-g (classification, 1000 rows, 20 features)
#   - 1461: bank-marketing (classification, 45211 rows, 16 features)
#   - 1590: adult (classification, 48842 rows, 14 features)
#   - 41021: boston housing (regression, 506 rows, 13 features) -- deprecated, use 43404
#   - 43404: california housing (regression, 20640 rows, 8 features)
#   - 41187: wine-quality (regression, 6497 rows, 12 features)
dataset_id: 1461

# Target column name (set null to use OpenML's default target)
target: null

# Number of training points for GP (controls O(n³) complexity)
nb_training_points: 500

# Number of data samples to use (set null to use all)
n_samples: 10000

# Training
epochs: 5
lr: 1.0e-3

# Kernel: "ProductOfSumsKernel", "WeightedSumKernel", "WeightedProductKernel", "NeuralKernel", "LLMKernel"
kernel: "WeightedSumKernel"

# Prior: "ConstantPrior", "ZeroPrior", "LinearPrior", "LLMPrior"
prior: "ConstantPrior"

# LLM Prior settings (only used when prior is "LLMPrior")
llm_prior:
  lambda: 0.6                  # Trust weight for LLM outputs vs. data mean
  trainable_lambda: true          # If false, λ is fixed (not updated by gradient descent)
  dataset_description: ""        # Optional description of dataset for LLM prompts
  models:
    - model: "nvidia_nim/openai/gpt-oss-120b"
      strategy: "statistical"
    - model: "nvidia_nim/openai/gpt-oss-120b"
      strategy: "domain_expert"
    - model: "nvidia_nim/openai/gpt-oss-120b"
      strategy: "pattern_matching"

# LLM Kernel settings (only used when kernel is "LLMKernel")
llm_kernel:
  base_kernel: "WeightedSumKernel"   # Traditional kernel to combine with LLM kernel
  lambda: 0.7                        # Weight for traditional kernel (1-λ for LLM kernel)
  trainable_lambda: false             # If false, λ is fixed

# Noise (fraction of output std)
noise: 0.01

# Show feature importance plot after training
plot_feature_importance: true
